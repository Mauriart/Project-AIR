<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIR - Iniciar sesion</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1a3e60;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    main {
      width: min(100%, 420px);
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 2rem;
    }

    h1 {
      margin: 0 0 0.4rem;
      font-size: 1.6rem;
    }

    p {
      margin: 0 0 1.5rem;
      color: #5f6f7d;
      font-size: 0.95rem;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.4rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #cfd8df;
      border-radius: 4px;
      font: inherit;
    }

    input:focus {
      border-color: #2c7da0;
      outline: 2px solid rgba(44, 125, 160, 0.18);
    }

    button {
      width: 100%;
      background-color: #2c7da0;
      color: white;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
    }

    button:hover {
      background-color: #1f5e7a;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .mensaje {
      display: none;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border-radius: 4px;
      font-size: 0.92rem;
    }

    .mensaje.error {
      display: block;
      background: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
    }

    .mensaje.exito {
      display: block;
      background: #d1e7dd;
      color: #0f5132;
      border: 1px solid #badbcc;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ingreso AIR</h1>
    <p>Acceso al sistema de gestion de certificaciones.</p>

    <div id="mensaje" class="mensaje" role="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">Contrasena</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button id="loginBtn" type="submit">Ingresar</button>
    </form>
  </main>

  <script>
    let authToken = null;

    if (sessionStorage.getItem('airToken')) {
      window.location.replace('/buscador');
    }

    const form = document.getElementById('loginForm');
    const button = document.getElementById('loginBtn');
    const mensaje = document.getElementById('mensaje');

    function mostrarMensaje(texto, tipo) {
      mensaje.textContent = texto;
      mensaje.className = `mensaje ${tipo}`;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      mensaje.className = 'mensaje';
      button.disabled = true;
      button.textContent = 'Ingresando...';

      const payload = {
        username: form.username.value.trim(),
        password: form.password.value
      };

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok || !data.ok || !data.token) {
          throw new Error(data.mensaje || 'No se pudo iniciar sesion');
        }

        authToken = data.token;
        sessionStorage.setItem('airToken', authToken);
        sessionStorage.setItem('airRoles', JSON.stringify(data.roles || []));
        sessionStorage.setItem('airPermisos', JSON.stringify(data.permisos || []));

        mostrarMensaje('Login exitoso. Redirigiendo...', 'exito');
        window.location.href = '/buscador';
      } catch (error) {
        mostrarMensaje(error.message, 'error');
      } finally {
        button.disabled = false;
        button.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
